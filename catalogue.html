<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Catalogue - INKNET</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: #0a0a0a;
      color: #f0f0f0;
    }
    header {
      background: rgba(10,10,10,0.95);
      padding: 1.5rem 6%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .logo { font-size: 2rem; font-weight: 700; color: #ffeb3b; letter-spacing: 3px; }
    nav a {
      color: #ddd;
      margin-left: 2rem;
      text-decoration: none;
      font-weight: 500;
    }
    nav a:hover { color: #ffeb3b; }

    .catalogue-hero {
      padding: 80px 6% 60px;
      text-align: center;
      background: linear-gradient(#111, #0a0a0a);
    }
    .catalogue-hero h1 {
      font-family: 'Playfair Display', serif;
      font-size: 3.5rem;
      color: #ffeb3b;
    }

    .books-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 1.8rem;
      padding: 60px 6% 100px;
      max-width: 1400px;
      margin: 0 auto;
    }
    .book-card {
      background: #111;
      border-radius: 14px;
      overflow: hidden;
      transition: all 0.4s ease;
      cursor: pointer;
    }
    .book-card:hover {
      transform: translateY(-10px);
      box-shadow: 0 20px 40px rgba(255, 235, 59, 0.2);
    }
    .book-card img {
      width: 100%;
      height: 260px;
      object-fit: cover;
    }
    .book-info {
      text-align: center;
    }
    .book-info h3 {
      color: #ffeb3b;
      font-size: 1.25rem;
      text-decoration: none;
      margin-bottom: 6px;
    }
    .book-info p {
      color: #aaa;
      font-size: 0.9rem;
      margin-bottom: 4px;

      @media (min-width: 1200px){
        grid-template-columns: repeat(4, 1fr);
        gap: 1.5rem
      }

      @media(max-width: 992px){
        .books-grid{
            grid-template-columns: repeat(2, 1fr);
            gap: 1.5rem
        }

        @media (max-width: 600px){
            .books-grid {
                grid-template-columns: (2, 1fr);
                padding: 40px 5% 80px;
            }
        }
      }

    }
  </style>
</head>
<body>
    <header>
    <div class="logo">INKNET</div>
    <nav>
      <a href="index.html">Home</a>
      <a href="catalogue.html">Catalogue</a>
      <a href="upload.html">Upload</a>
      <a href="#">Community</a>
    </nav>
  </header>

  <section class="catalogue-hero">
    <h1>Browse Our Collection</h1>
    <p style="margin-top: 15px; color: #ccc; font-size: 1.3rem;">Thousands of stories waiting for you</p>
  </section>

  <div class="books-grid">
    <!-- Example books -->
    <a href="pricetag.html" class="book-card"><img src="images/pricetag.jpg" alt="PRICE TAG"><div class="book-info"><h3>Price Tag</h3><p>Drama • INKNET</p><p style="color: #ffeb3b;">30</p></div></a>
    <a href="redvelvet.html" class="book-card"><img src="images/redvelvet.jpg" alt="RED VELVET"><div class="book-info"><h3>Red Velvet</h3><p>Thriller • INKNET</p><p style="color: #ffeb3b;">45</p></div></a>
    <a href="nobodymove.html" class="book-card"><img src="images/nobodymove.jpg" alt="NOBODY MOVE"><div class="book-info"><h3>Nobody Move</h3><p>Mystery • INKNET</p><p style="color: #ffeb3b;">27</p></div></a>
    <a href="clockwise.html" class="book-card"><img src="images/clockwise.jpg" alt="CLOCK WISE"><div class="book-info"><h3>CLOCK WISE</h3><p>Mystery • INKNET</p><p style="color: #ffeb3b;">29</p></div></a>
  </div>

</body>
</html>
